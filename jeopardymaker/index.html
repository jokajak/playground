<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy Maker</title>
  <style>
    /* ── Reset + base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #060CE9;
      --gold:       #FFD700;
      --dark:       #060060;
      --light-blue: #1a1aff;
      --text-light: #fff;
      --revealed:   #222;
      --p1-color:   #e74c3c;
      --p2-color:   #2ecc71;
      --danger:     #c0392b;
      --radius:     6px;
    }

    body {
      font-family: 'Arial Black', Arial, sans-serif;
      background: var(--dark);
      color: var(--text-light);
      min-height: 100vh;
    }

    button { cursor: pointer; font-family: inherit; }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--gold);
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: bold;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover:not(:disabled) { background: var(--gold); color: var(--dark); }
    .btn.primary { background: var(--gold); color: var(--dark); }
    .btn.primary:hover { background: #e6c200; border-color: #e6c200; }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: #fff; }
    .btn.small { padding: 4px 10px; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Home screen ──────────────────────────────────────────────────────── */
    .home-root { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .home-header h1 {
      font-size: 2.5rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px #000;
    }
    .home-actions { display: flex; gap: 12px; margin-bottom: 28px; }
    .empty-state { color: #aaa; text-align: center; margin-top: 40px; }
    .board-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .board-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: var(--radius);
      padding: 14px 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .board-info { display: flex; flex-direction: column; gap: 4px; }
    .board-title { font-size: 1.1rem; font-weight: bold; color: var(--gold); }
    .board-meta { font-size: 0.8rem; color: #aaa; font-weight: normal; }
    .board-btns { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Editor ───────────────────────────────────────────────────────────── */
    .editor-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 8px;
      gap: 8px;
    }
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .editor-title-input {
      flex: 1;
      min-width: 140px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,215,0,0.4);
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }
    .editor-title-input:focus { outline: none; border-color: var(--gold); }
    .cat-ctrl { display: flex; align-items: center; gap: 8px; }
    .cat-count { font-size: 0.85rem; color: #ccc; min-width: 90px; text-align: center; font-weight: normal; }

    .editor-grid {
      display: grid;
      flex: 1;
      gap: 4px;
      min-height: 0;
      overflow: auto;
    }
    .editor-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 6px;
      overflow: hidden;
      position: relative;
    }
    .editor-header-cell {
      background: var(--blue);
      border: 2px solid var(--light-blue);
      min-height: 56px;
    }
    .cat-title-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,215,0,0.35);
      color: #fff;
      text-align: center;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: bold;
      padding: 4px 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .cat-title-input:focus { outline: none; border-bottom-color: var(--gold); }
    .editor-value-cell {
      background: var(--blue);
      border: 2px solid var(--light-blue);
      cursor: pointer;
      min-height: 70px;
      transition: background 0.15s;
    }
    .editor-value-cell:hover { background: var(--light-blue); }
    .cell-val { font-size: 1rem; font-weight: bold; color: var(--gold); }
    .cell-preview {
      font-size: 0.68rem;
      color: #ccc;
      font-weight: normal;
      text-align: center;
      margin-top: 3px;
      overflow: hidden;
      max-height: 36px;
      line-height: 1.3;
    }
    .cell-thumb { max-width: 80%; max-height: 44px; margin-top: 4px; object-fit: contain; border-radius: 2px; }
    .cell-dots { position: absolute; bottom: 3px; right: 4px; display: flex; gap: 3px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-p { background: #3498db; }
    .dot-a { background: #2ecc71; }

    /* Editor modal */
    .editor-modal-content {
      max-width: 560px;
      width: 100%;
      min-height: 400px;
      gap: 14px;
    }
    .editor-modal-heading { color: var(--gold); font-size: 1.15rem; font-weight: bold; }
    .editor-tab-bar { display: flex; gap: 8px; width: 100%; }
    .tab-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 2px solid transparent;
      color: #aaa;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); }
    .editor-tab-body { width: 100%; }
    .tab-pane { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .editor-textarea {
      width: 100%;
      min-height: 110px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,215,0,0.3);
      color: #fff;
      padding: 10px;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
    }
    .editor-textarea:focus { outline: none; border-color: var(--gold); }

    /* Image dropzone */
    .editor-dropzone {
      border: 2px dashed rgba(255,215,0,0.35);
      border-radius: 4px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: #999;
      font-size: 0.82rem;
      font-weight: normal;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .editor-dropzone:hover,
    .editor-dropzone.drag-over { border-color: var(--gold); background: rgba(255,215,0,0.04); }
    .editor-dropzone.has-image { border-style: solid; border-color: rgba(255,215,0,0.5); }
    .dropzone-thumb { max-width: 100%; max-height: 160px; object-fit: contain; border-radius: 4px; }
    .dropzone-hint { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .dropzone-error { color: #e74c3c; font-size: 0.82rem; min-height: 1.1em; }

    /* ── Play screen ──────────────────────────────────────────────────────── */
    .play-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 8px;
      gap: 8px;
    }
    .scorebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .scorebar-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .scorebar-scores { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
    .player-score { font-size: 1.2rem; font-weight: bold; white-space: nowrap; }
    .ctrl-btn {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      padding: 4px 12px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-family: inherit;
    }
    .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }

    .play-board { display: grid; flex: 1; gap: 6px; min-height: 0; }
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-weight: bold;
      text-align: center;
      padding: 8px;
      overflow: hidden;
    }
    .header-cell {
      background: var(--blue);
      color: var(--text-light);
      font-size: clamp(0.65rem, 1.4vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--light-blue);
      min-height: 56px;
    }
    .value-cell {
      background: var(--blue);
      color: var(--gold);
      font-size: clamp(1rem, 2.5vw, 2rem);
      cursor: pointer;
      border: 2px solid var(--light-blue);
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .value-cell:hover:not(.revealed) { background: var(--light-blue); transform: scale(1.02); }
    .value-cell.revealed { background: var(--revealed); color: #444; cursor: default; border-color: #333; }

    /* ── Modal overlay ────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-content {
      background: var(--blue);
      border: 4px solid var(--gold);
      border-radius: 12px;
      padding: 32px 40px;
      max-width: 700px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-value { color: var(--gold); font-size: 1.6rem; font-weight: bold; }
    .modal-text { font-size: clamp(1.1rem, 2.8vw, 1.9rem); line-height: 1.4; color: var(--text-light); }
    .modal-image { max-width: 100%; max-height: 52vh; border-radius: 8px; object-fit: contain; }
    .modal-hint { font-size: 0.78rem; color: #aaa; font-weight: normal; margin-top: 4px; }

    /* Buzz state: dynamic border color via CSS variable */
    .modal-overlay.buzz-active .modal-content { border-color: var(--buzz-color, var(--gold)); }

    /* On-screen buzz controls */
    .buzz-controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 4px; }
    .buzz-btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .buzz-player-btn {
      font-size: 1.1rem;
      padding: 10px 22px;
      border-width: 3px;
    }
    .buzz-player-btn:hover { opacity: 0.85; }
    .buzz-badge-active {
      font-size: 1.15rem;
      font-weight: bold;
      border: 3px solid;
      border-radius: 24px;
      padding: 6px 24px;
      letter-spacing: 1px;
    }
    .buzz-action-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .buzz-correct-btn { font-size: 1.1rem; padding: 10px 28px; color: #fff; }
    .buzz-wrong-btn { font-size: 1.1rem; padding: 10px 28px; }
    .buzz-util-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; opacity: 0.75; }

    /* Player count picker */
    .player-count-modal { max-width: 360px; gap: 24px; }
    .player-count-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .player-count-btn { font-size: 1.6rem; padding: 14px 20px; min-width: 60px; }

    /* ── Help overlay ─────────────────────────────────────────────────────── */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .help-content {
      background: #0a0a50;
      border: 3px solid var(--gold);
      border-radius: 12px;
      padding: 32px 40px;
      max-width: 480px;
      width: 100%;
    }
    .help-content h2 { color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 1.3rem; letter-spacing: 1px; }
    .help-table { width: 100%; border-collapse: collapse; font-weight: normal; }
    .help-table tr:not(:last-child) td { border-bottom: 1px solid rgba(255,215,0,0.15); }
    .help-table td { padding: 8px 6px; font-size: 0.9rem; }
    .help-table td:first-child { color: var(--gold); font-weight: bold; text-align: center; font-family: monospace; font-size: 1rem; width: 60px; }
    .help-close { display: block; margin: 20px auto 0; }

    /* ── App container ────────────────────────────────────────────────────── */
    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { mountHome } from './src/home.js';
    import { mountEditor } from './src/editor.js';
    import { mountPlay } from './src/play.js';

    const app = document.getElementById('app');

    function showHome() {
      mountHome(app, { onPlay: showPlay, onEdit: showEditor });
    }

    function showEditor(board) {
      mountEditor(app, board, showHome);
    }

    function showPlay(board, state) {
      mountPlay(app, board, state, showHome);
    }

    showHome();
  </script>
</body>
</html>
